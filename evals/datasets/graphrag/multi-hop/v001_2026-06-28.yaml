- id: graphrag-mh-01
  input:
    message: После курса AI-driven Fullstack какая следующая ступень комбо «ИИ-агенты»
      и какие новые темы там появляются по сравнению с Fullstack?
    channel: web
  expected_output:
    answer: 'После ступени 2 (AI-driven Fullstack, slug ai-driven-fullstack) по цепочке
      RECOMMENDED_BEFORE идёт ступень 3 — «AI-driven разработка ИИ-агентов» (ai-coding-agents-base).
      В Fullstack (10 занятий) фокус на full cycle: Telegram/веб, backend API, PostgreSQL,
      frontend, Docker, CI/CD, observability и production-деплой. На ступени Agents
      (11 занятий, гибрид 8 live + 3 запись) добавляются RAG (LangChain), мониторинг
      и evals RAG, Advanced RAG с hybrid search, LangGraph и tool calling, MCP, security/guardrails,
      evals агентов и multi-agent — то, чего нет как отдельного блока во Fullstack.'
  metadata:
    segment: b2c
    question_segment: multi-hop
    intent: multi-hop
    source: synthetic
    gt_quality: verified
    reviewed_by: sprint-06-task-02
    required_entities: &id001
    - ai-driven-fullstack
    - ai-coding-agents-base
    - RAG
    - LangGraph
    - MCP
    - Hybrid Search
    facts: *id001
- id: graphrag-mh-02
  input:
    message: В каком курсе траектории комбо изучается GraphRAG и что нужно пройти
      до этой темы?
    channel: web
  expected_output:
    answer: 'GraphRAG — тема 5 программы «Deep Agents: продвинутая разработка ИИ-агентов»
      (deep-agents-advanced, ступень 4). До неё по программе Deep Agents идут векторные
      БД (тема 4), а концептуально GraphRAG опирается на базовый RAG (ступень 3 Agents,
      темы 4–6) и Vector DB. В описании GraphRAG требует Vector DB, Knowledge Graph
      и RAG pipeline.'
