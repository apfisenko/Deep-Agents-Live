- id: graphrag-mh-03
  input:
    message: Где в траектории комбо изучается MCP и после каких тем его логично брать?
    channel: web
  expected_output:
    answer: 'MCP (Model Context Protocol) подробно в «AI-driven разработка ИИ-агентов»
      — тема 8 (после LangGraph/tool calling в теме 7). В Deep Agents MCP встречается
      в темах 1–2 (интеграция инструментов, контекст кодового агента), теме 7 (внешние
      источники) и теме 10 (prompt management). Логичный порядок: сначала LangGraph
      и tool calling на ступени Agents (т.7), затем MCP (т.8); в Deep Agents MCP углубляется
      на production-уровне.'
