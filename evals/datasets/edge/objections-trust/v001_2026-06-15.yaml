    intent: objection
    source: real_dialog
    gt_quality: verified
    product_id: ai-agents-combo
    facts:
    - демо до оплаты через запись 2025
    - возврат 14 дней
    - нет публичных демо всех курсов
    - один SKU
    source_chat: CHAT_0110
