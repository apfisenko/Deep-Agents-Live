- id: obj-ext-010
  input:
    message: Привет. Ну я давно хотел попробовать курсор. Я много чего делаю с ИИ, но вообще не программист.
      Но мне не подходит по формату затрат времени — я не смогу потратить рабочую пятницу на звонок.
    channel: telegram
  expected_output:
    answer: 'Вам подходит **интенсив AI-кодинг в Cursor** (ai-coding-intensive-cursor) по содержанию —
      он как раз для не-программистов, которые работают с ИИ.


      Текущий поток с созвоном в **рабочую пятницу 10:00 МСК** вам не подойдёт для live. Варианты:

      • дождаться **следующего потока** (в анонсах — **суббота или вечер**);

      • если готовы к асинхрону — **запись** созвона + чат недели (но только если реально будете смотреть
      запись).


      Альтернатива с гибким темпом без жёсткой пятницы — **комбо** или курс агентов **в записи**. Что
      важнее: именно Cursor за 1–2 недели или длинная траектория?'
  metadata:
    segment: b2c
    intent: format-mismatch
    source: real_dialog
    gt_quality: verified
    product_id: ai-coding-intensive-cursor
    facts:
    - интенсив для не-программистов
    - пятница 10:00 — текущий поток
    - след. поток — суббота/вечер
    - запись + чат
    source_chat: CHAT_0020
    legacy_id: ext-010
    reviewed_by: user-approved-2026-06-15
- id: obj-ext-011
  input:
    message: можете показать  какие то отрывки материалов прошлого курса? пока не понимаю что за предмет
      вы преподаете. интересуют именно отрывки материалов прошлого курса, стоит ли платить такие большие
      деньги
    channel: web
  expected_output:
    answer: 'Понимаю запрос: хотите **увидеть урок**, а не только описание.


      При покупке **комбо «ИИ-агенты»** (ai-agents-combo) сразу открывается доступ к **курсу 2025 в записи**
      — можно оценить стиль и глубину до полного прохождения live-части 2026. Действует **гарантия возврата
      14 дней** (за вычетом комиссий платёжки, если применимо).


      Чтобы предложить релевантный фрагмент: уточните, что ближе — **интенсив Cursor**, **Fullstack**,
      **агенты** или **Deep Agents**? Публичные демо-ссылки на все курсы сразу мы не выдаём — подберём
      программу под ваш уровень.'
  metadata:
    segment: b2c
    intent: objection
    source: real_dialog
    gt_quality: approximate
    product_id: ai-agents-combo
    facts:
    - комбо даёт доступ к записи 2025
    - возврат 14 дней
    - нужно уточнить какой курс для демо
    source_chat: CHAT_0110
    legacy_id: ext-011
    reviewed_by: user-approved-2026-06-15
- id: obj-ext-012
  input:
    message: 'мне очень много лет и я в этом бизнесе очень давно. меня не привлекают картинки и отзывы.

      вам проще показать какой то материал, что бы я мог сделать вывод о том стоит ли мне платить или
      нет'
    channel: web
  expected_output:
    answer: 'Понимаю: нужен **фрагмент урока**, а не отзывы.


      Сначала сузим программу — у нас несколько курсов (интенсив, Fullstack, агенты, Deep Agents, комбо).
      Напишите, что хотите получить от обучения (например, «агенты под продукт» или «прототипы») — предложу
      **один** SKU и как посмотреть материал.


      С **комбо** сразу доступна **запись 2025** для оценки качества; есть **возврат 14 дней**. Без понимания
      цели не буду навязывать оплату.'
  metadata:
    segment: b2c
    intent: objection
    source: real_dialog
    gt_quality: approximate
    product_id: ai-agents-combo
    facts:
    - нужен фрагмент урока не отзывы
    - уточнить цель и один SKU
    - комбо — запись 2025
    - возврат 14 дней
    source_chat: CHAT_0110
    legacy_id: ext-012
    reviewed_by: user-approved-2026-06-15
- id: obj-ext-0110-goal
  input:
    message: Зачем вам моя цель? Вам надо привлечь меня, чтобы я заплатил порядочную сумму, а не анкетировать.
    channel: web
  expected_output:
    answer: 'Цель и опыт нужны не «ради анкеты», а чтобы **не продать неподходящий продукт** — мы отказываем,
      если уровень не match (например, agents без базы).


      При этом понимаю запрос на **доказательство качества**: с **комбо** после покупки сразу доступ к
      **записи 2025** для оценки; **возврат 14 дней** (минус комиссии платёжки, если применимо).


      Публичные демо-ссылки на все курсы сразу не выдаём — подберём **один** SKU под вашу цель.'
  metadata:
    segment: b2c
    intent: objection
    source: real_dialog
    gt_quality: verified
    product_id: ai-agents-combo
    facts:
    - fit-check не нажива
    - запись 2025 после покупки
    - возврат 14 дней
    - нет публичных демо всех курсов
    source_chat: CHAT_0110
    source_kb: data/b2c/programs/ai-agents-combo.md
    reviewed_by: user-approved-2026-06-15
- id: obj-ext-0110-pre
  input:
    message: Хочу посмотреть часть уроков до оплаты, а не покупать вслепую и потом просить возврат. Если
      материал сильный — поделиться фрагментом вам на пользу.
    channel: web
  expected_output:
    answer: 'Согласен: **лучше увидеть стиль до оплаты**, чем полагаться только на возврат.


      Политика: **публичные демо-ссылки на все курсы сразу не выдаём**; с **комбо** после покупки открывается
      **запись 2025** — можно оценить качество в первые **14 дней** и вернуть деньги (за вычетом комиссий,
      если применимо).


      Сначала сузим программу (интенсив / Fullstack / agents / Deep) — предложу **один** SKU и путь к
      материалу.'
  metadata:
