- id: obj-syn-004
  input:
    message: Курс agents интересен, но live только днём в будни — я не смогу. Запись не подойдёт, мне
      нужен именно live вечером.
    channel: telegram
  expected_output:
    answer: 'Понимаю: если **live обязателен** и **дневные слоты не подходят**, насильно предлагать «просто
      запись» не буду.


      **Agents** — гибрид (часть live + часть в записи); точное расписание на llmstart.ru/agents/. Если
      текущий поток не fit — можно **дождаться следующего набора** или рассмотреть **интенсив/комбо в
      записи** с гибким темпом.


      Честно: если вам нужен только вечерний live и вы не смотрите записи — лучше дождаться подходящего
      потока, чем покупать неудобный формат.'
  metadata:
    segment: b2c
    intent: format-mismatch
    source: synthetic
    gt_quality: approximate
    product_id: ai-coding-agents-base
    facts:
    - не навязывать запись
