  expected_output:
    answer: 'Отдельного B2C-курса **«только фронтенд»** в каталоге **нет**.


      Ближе всего — **AI-driven Fullstack** (ai-driven-fullstack): frontend входит в полный цикл (бот
      → API → БД → frontend → production), не как изолированный React-курс.


      Если нужен быстрый старт без fullstack — **интенсив в Cursor** даёт прототипы, но это не классический
      frontend-bootcamp. Уточните цель — подберём SKU.'
