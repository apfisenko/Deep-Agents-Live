- id: e2e-qa-ext-001
  input:
    message: Добрый день. Заинтересовал комбо курс. Скажите, какой формат у курсов? Можно будет проходить
      в свое удобное время? Или есть какое-то расписание? Не могу найти его на сайте.
    channel: web
  expected_output:
    answer: 'Комбо «ИИ-агенты» — это последовательность из четырёх программ (интенсив в Cursor → Fullstack
      → базовый курс по агентам → Deep Agents) плюс запись интенсива в подарок.


      Формат гибридный: можно идти в онлайн-потоке, и смотреть записи в своём темпе. Сейчас в комбо идёт
      Fullstack (10 занятий, live вт/чт 16:00–18:00 МСК); далее стартуют потоки по агентам и Deep Agents
      по расписанию на сайте.


      Материалы и чат поддержки — на срок доступа (обычно 1 год). Точные даты текущих потоков — на llmstart.ru/ai-agents-combo/
      или уточню по интересующей ступени.'
  metadata:
    segment: b2c
    intent: format_schedule
    source: real_dialog
    gt_quality: verified
    product_id: ai-agents-combo
    facts:
    - 4 программы + бонус-запись интенсива
    - онлайн-поток или записи в своём темпе
    - fullstack live вт/чт 16–18 МСК
    - чат поддержки
    - доступ к материалам ~1 год
    source_chat: CHAT_0014
    legacy_id: ext-001
    reviewed_by: user-approved-2026-06-15
- id: e2e-qa-ext-002
  input:
    message: Привет. У меня вопрос про интеснив. По каким дням и во сколько семинары?
    channel: telegram
  expected_output:
    answer: 'Интенсив **AI-кодинг ИИ-агентов в Cursor** (ai-coding-intensive-cursor) — короткий формат:


      • Главный онлайн-созвон ~4 часа (в анонсированных потоках — пятница, 10:00 МСК; уточняйте актуальную
      дату на llmstart.ru/vibe-coding/).

      • Неделя поддержки в чате на домашнее задание.

      • Финальный созвон по вопросам и разбору ДЗ.


      Полное описание и ближайший поток — на сайте. Если нужен вечер/выходные — смотрите анонсы следующих
      потоков в канале курса.'
  metadata:
    segment: b2c
    intent: format_schedule
    source: real_dialog
    gt_quality: verified
    product_id: ai-coding-intensive-cursor
    facts:
    - созвон ~4 ч
    - неделя чата
    - финальный созвон
    - актуальное расписание на сайте
    source_chat: CHAT_0020
    legacy_id: ext-002
    reviewed_by: user-approved-2026-06-15
- id: e2e-qa-ext-003
  input:
    message: подскажите в какое время будут проходить занятия и какая продолжительность ?
