      уточняется — ориентир **вечер или выходные**. Записи эфиров будут в любом случае.


      Курсы **2025 года** в записи уже доступны сразу после покупки комбо — их можно смотреть в своём
      темпе без привязки к live.


      Если интересует конкретная ступень (интенсив, Fullstack, Agents, Deep Agents) — напишите, дам расписание
      по ней.'
  metadata:
    segment: b2c
    intent: format_schedule
    source: real_dialog
    gt_quality: verified
    product_id: ai-agents-combo
    facts:
    - занятие до 2 часов
