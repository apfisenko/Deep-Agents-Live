- id: e2e-qa-ext-005
  input:
    message: Подскажите, не планируете ли проводить курс по AI-кодингу веб-проектов (фронтенд / бэкенд)?
      Возможно у вас есть в записях.
    channel: web
  expected_output:
    answer: 'Отдельного B2C-курса «только веб front/back» в каталоге сейчас нет.


      Ближе всего:

      • **AI-driven Fullstack** — полный цикл (frontend, backend, DevOps) в AI-driven подходе.

      • **AI-driven разработка ИИ-агентов** — методика применима и к веб-проектам; есть потоки и записи.


      Комплекс «бот + веб + бэк + API» для **корпоративных заказчиков** — отдельное направление (B2B),
      не розничная оплата на сайте. Если интересен веб для себя — могу сузить рекомендацию под ваш уровень;
      если для компании — переведу на корпоративный формат.'
  metadata:
    segment: b2c
    intent: product_fit
    source: real_dialog
    gt_quality: verified
    product_id: ai-driven-fullstack
    facts:
    - нет отдельного b2c веб-only курса
    - fullstack покрывает веб-стек
    - agents — методика для веб
    - корп. веб — B2B
    source_chat: CHAT_0070
    legacy_id: ext-005
    reviewed_by: user-approved-2026-06-15
