- id: seg-route-ext-007
  input:
    message: Здравствуйте. Нужно обучить команду разработчиков по ИИ-агентам, около 20 человек, бюджет
      порядка миллиона рублей. Как у вас оформляют корпоративное обучение?
    channel: web
  expected_output:
    answer: 'Запрос корпоративный (B2B) — для команды ~20 человек и бюджета ~1 млн ₽ подойдёт **кастомная
      программа** на базе наших публичных курсов (например, AI-кодинг агентов + Deep Agents): записи +
      live, отдельный чат команды, стартовая сессия, договор.


      Через виджет **нельзя** оформить как розничную оплату одного B2C-места — подготовим предложение
      и документы с менеджером.


      Уточните, пожалуйста: сроки старта, нужен ли полный трек или только Deep Agents, и контакт для КП.'
  metadata:
    segment: b2b
    intent: segment-route
    source: real_dialog
    gt_quality: verified
    must_not:
    - create_payment_link
    facts:
    - b2b — договор и КП
    - типично 2 курса agents + deep
    - до ~20 мест
    - без b2c payment link
    source_chat: CHAT_0127
    legacy_id: ext-007
    reviewed_by: user-approved-2026-06-15
- id: seg-route-ext-014
  input:
    message: <AUTHOR>, добрый день! Отдала внутреннему заказчику, но он был в отпуске до конца прошлой
      неделе, поэтому ко мне никто не вернулся. Поэтому пока сама не могу к вам вернуться ни с чем
    channel: telegram
  expected_output:
    answer: 'Спасибо за статус — это **корпоративное согласование** (B2B), торопить с оплатой не будем.


      Когда будет ответ внутреннего заказчика — напишите: скорректируем **сроки старта** и состав программы
      (agents + Deep Agents для команды) под ваши ограничения.


      Розничную ссылку на оплату одного места здесь не пришлю — для команды оформляем **договор и КП**,
      как в согласованном предложении.'
  metadata:
    segment: b2b
    intent: segment-route
    source: real_dialog
    gt_quality: verified
    must_not:
    - create_payment_link
    facts:
    - b2b — ждём заказчика
    - без b2c payment
    - можно сдвинуть даты КП
    source_chat: CHAT_0127
    legacy_id: ext-014
    reviewed_by: user-approved-2026-06-15
- id: seg-route-syn-011
  input:
    message: Нам в компании нужен тренинг по LangGraph и RAG для 30 инженеров. Можно оплатить комбо на
      сайте картой?
    channel: web
  expected_output:
    answer: 'Запрос **корпоративный (B2B)** — обучение **команды 30 человек** не оформляется как розничное
      **комбо с оплатой на сайте**.


      Для компаний — **отдельная программа**: адаптация под стек, договор, КП, чат команды, сочетание
      записей и live (как в наших B2B-кейсах на базе курсов Agents / Deep Agents).


      Опишите сроки и цель (RAG, LangGraph, MCP) — передам в корпоративный канал. **create_payment_link**
      для B2C здесь не применяем.'
  metadata:
    segment: b2b
    intent: segment-route
    source: synthetic
    gt_quality: verified
    must_not:
    - create_payment_link
    facts:
    - b2b не b2c оплата
    - команда 30
    - договор КП
    - адаптация программы
    source_chat: null
    legacy_id: syn-011
    source_kb: data/b2c/programs/ai-agents-combo.md
    reviewed_by: user-approved-2026-06-15
- id: seg-route-ext-0070
  input:
    message: Слышал, у вас в разработке комплекс бот+веб+бэк для компаний. Можем как юрлицо купить это
      на сайте картой или только по договору?
    channel: web
  expected_output:
    answer: 'Комплекс «бот + веб + бэк + API» для **корпоративных заказчиков** — это **B2B-направление**,
      не розничная оплата на сайте.


      Для компании готовим **индивидуальную программу/разработку** и **договор с КП**. Через виджет B2C-курса
      такой запрос не оформляется.


      Если нужен веб для **личного обучения** — отдельно есть B2C **AI-driven Fullstack**. Уточните: запрос
      от компании или для себя?'
  metadata:
    segment: b2b
    intent: segment-route
    source: real_dialog
    gt_quality: verified
    must_not:
    - create_payment_link
    facts:
    - корп web — B2B
    - не b2c оплата
    - договор КП
    - fullstack для физлица отдельно
    source_chat: CHAT_0070
    source_kb: data/b2b/corporate-training.md
    reviewed_by: user-approved-2026-06-15
