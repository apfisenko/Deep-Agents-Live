- id: rag-prod-ext-005
  input:
    message: Подскажите, не планируете ли проводить курс по AI-кодингу веб-проектов (фронтенд / бэкенд)?
      Возможно у вас есть в записях.
    channel: web
  expected_output:
    answer: 'Отдельного B2C-курса «только веб front/back» в каталоге сейчас нет.


      Ближе всего:

      • **AI-driven Fullstack** — полный цикл (frontend, backend, DevOps) в AI-driven подходе.

      • **AI-driven разработка ИИ-агентов** — методика применима и к веб-проектам; есть потоки и записи.


      Комплекс «бот + веб + бэк + API» для **корпоративных заказчиков** — отдельное направление (B2B),
      не розничная оплата на сайте. Если интересен веб для себя — могу сузить рекомендацию под ваш уровень;
      если для компании — переведу на корпоративный формат.'
  metadata:
    segment: b2c
    intent: compare
    source: real_dialog
    gt_quality: verified
    product_id: ai-driven-fullstack
    facts:
    - нет отдельного b2c веб-only курса
    - fullstack покрывает веб-стек
    - agents — методика для веб
    - корп. веб — B2B
    source_chat: CHAT_0070
    legacy_id: ext-005
    reviewed_by: user-approved-2026-06-15
- id: rag-prod-ext-006
  input:
    message: ИТ разработка, в основном в области ИИ. Но код сам не пишу. Ближе к CPO. В целом руку набить
      на инструменте хочу, чтото сам прототипировать.
    channel: telegram
  expected_output:
    answer: 'Профиль CPO без ежедневного кодинга — как раз целевая аудитория наших программ: в AI-driven
      подходе **пишет в основном Cursor/агент**, а не вы вручную.


      Логичный маршрут — **комбо «ИИ-агенты»** (ai-agents-combo): от интенсива в Cursor → Fullstack →
      агенты → Deep Agents одной траекторией, можно в записи и в потоке.


      Если нужен быстрый старт без длинной траектории — только **интенсив в Cursor** (ai-coding-intensive-cursor).
      Могу кратко сравнить комбо и интенсив по времени и цене.'
  metadata:
    segment: b2c
    intent: combo
    source: real_dialog
    gt_quality: verified
    product_id: ai-agents-combo
    facts:
    - CPO/не пишет код — ЦА
    - комбо — полная траектория
    - альтернатива — интенсив cursor
    source_chat: CHAT_0014
    legacy_id: ext-006
    reviewed_by: user-approved-2026-06-15
- id: rag-prod-ext-009
  input:
    message: "Понял. Я бы купил курс, но именно эта неделя (до 15 сентября) очень загруженная. У вас следующий\
      \ поток когда? \nБудет ли ещё в сентябре набор?"
    channel: web
  expected_output:
    answer: 'Для **AI-driven разработка ИИ-агентов** (ai-coding-agents-base) можно зайти в **текущий поток**
      (если ещё открыт набор) или дождаться **следующего набора** — в переписке ориентировали на **сентябрь**,
      точные даты публикуются на llmstart.ru/agents/.


      Курс также доступен **в записи** — можно начать позже в своём темпе, если live сейчас неудобен.


      Напишите, интересен полный курс агентов или короткий **интенсив в Cursor** — подскажу ближайшие
      даты именно для вашего варианта.'
  metadata:
    segment: b2c
    intent: product-fit
    source: real_dialog
    gt_quality: approximate
    product_id: ai-coding-agents-base
    facts:
    - набор/поток — смотреть на сайте agents
    - есть формат в записи
    - сентябрьский набор упоминался
    source_chat: CHAT_0070
    legacy_id: ext-009
    reviewed_by: user-approved-2026-06-15
- id: rag-prod-ext-010
  input:
    message: Привет. Ну я давно хотел попробовать курсор. Я много чего делаю с ИИ, но вообще не программист.
      Но мне не подходит по формату затрат времени — я не смогу потратить рабочую пятницу на звонок.
    channel: telegram
  expected_output:
    answer: 'Вам подходит **интенсив AI-кодинг в Cursor** (ai-coding-intensive-cursor) по содержанию —
      он как раз для не-программистов, которые работают с ИИ.


      Текущий поток с созвоном в **рабочую пятницу 10:00 МСК** вам не подойдёт для live. Варианты:

      • дождаться **следующего потока** (в анонсах — **суббота или вечер**);

      • если готовы к асинхрону — **запись** созвона + чат недели (но только если реально будете смотреть
      запись).


      Альтернатива с гибким темпом без жёсткой пятницы — **комбо** или курс агентов **в записи**. Что
      важнее: именно Cursor за 1–2 недели или длинная траектория?'
  metadata:
    segment: b2c
    intent: compare
    source: real_dialog
    gt_quality: verified
    product_id: ai-coding-intensive-cursor
    facts:
    - интенсив для не-программистов
    - пятница 10:00 — текущий поток
    - след. поток — суббота/вечер
    - запись + чат
    source_chat: CHAT_0020
    legacy_id: ext-010
    reviewed_by: user-approved-2026-06-15
- id: rag-prod-ext-011
  input:
    message: можете показать  какие то отрывки материалов прошлого курса? пока не понимаю что за предмет
      вы преподаете. интересуют именно отрывки материалов прошлого курса, стоит ли платить такие большие
      деньги
    channel: web
  expected_output:
    answer: 'Понимаю запрос: хотите **увидеть урок**, а не только описание.


      При покупке **комбо «ИИ-агенты»** (ai-agents-combo) сразу открывается доступ к **курсу 2025 в записи**
      — можно оценить стиль и глубину до полного прохождения live-части 2026. Действует **гарантия возврата
      14 дней** (за вычетом комиссий платёжки, если применимо).


      Чтобы предложить релевантный фрагмент: уточните, что ближе — **интенсив Cursor**, **Fullstack**,
      **агенты** или **Deep Agents**? Публичные демо-ссылки на все курсы сразу мы не выдаём — подберём
      программу под ваш уровень.'
  metadata:
    segment: b2c
    intent: product-fit
    source: real_dialog
    gt_quality: approximate
    product_id: ai-agents-combo
    facts:
    - комбо даёт доступ к записи 2025
    - возврат 14 дней
    - нужно уточнить какой курс для демо
    source_chat: CHAT_0110
    legacy_id: ext-011
    reviewed_by: user-approved-2026-06-15
- id: rag-prod-ext-012
  input:
    message: 'мне очень много лет и я в этом бизнесе очень давно. меня не привлекают картинки и отзывы.

      вам проще показать какой то материал, что бы я мог сделать вывод о том стоит ли мне платить или
      нет'
    channel: web
  expected_output:
    answer: 'Понимаю: нужен **фрагмент урока**, а не отзывы.


      Сначала сузим программу — у нас несколько курсов (интенсив, Fullstack, агенты, Deep Agents, комбо).
      Напишите, что хотите получить от обучения (например, «агенты под продукт» или «прототипы») — предложу
      **один** SKU и как посмотреть материал.


      С **комбо** сразу доступна **запись 2025** для оценки качества; есть **возврат 14 дней**. Без понимания
      цели не буду навязывать оплату.'
  metadata:
    segment: b2c
    intent: product-fit
    source: real_dialog
    gt_quality: approximate
    product_id: ai-agents-combo
    facts:
    - нужен фрагмент урока не отзывы
    - уточнить цель и один SKU
    - комбо — запись 2025
    - возврат 14 дней
    source_chat: CHAT_0110
