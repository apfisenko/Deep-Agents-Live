- id: rag-fmt-ext-013
  input:
    message: "Нет так со мной не сработает. Я знаю что я не посмотрю в итоге видео. Синхрон обязателен.\
      \ \n\nЕсть более привычные форматы интенсивов — когда условно 2 или 3 раза в неделю созвоны после\
      \ рабочего дня. Ну или там в выходные."
    channel: telegram
  expected_output:
    answer: 'Принял: вам нужен **живой формат в удобные слоты**, а не «посмотрите запись».


      Текущий поток интенсива с одной **пятницей 10:00 МСК** вам не подходит. Мы как раз планировали **следующий
      поток** с занятиями в **субботу или вечером** — следите анонс на llmstart.ru/vibe-coding/ и в канале
      курса.


      Если синхрон регулярный важнее скорости — посмотрите **курсы с серией занятий 2 ч** (Agents, Deep
      Agents, Fullstack в потоке) — там график ближе к «несколько раз в неделю», плюс записи.'
  metadata:
    segment: b2c
    intent: schedule
    source: real_dialog
    gt_quality: verified
    product_id: ai-coding-intensive-cursor
    facts:
    - не предлагать запись как замену sync
    - след. поток интенсива — суббота/вечер
    - альтернатива — курсы с серией занятий
    source_chat: CHAT_0020
    legacy_id: ext-013
    reviewed_by: user-approved-2026-06-15
- id: rag-fmt-syn-001
  input:
    message: Расскажите в двух словах, чем по сути отличается курс «AI-driven разработка ИИ-агентов» от
      интенсива в Cursor? Кому он нужен?
    channel: web
  expected_output:
    answer: '**AI-driven разработка ИИ-агентов** (ai-coding-agents-base) — это не короткий интенсив, а
      **средний курс ~1,5 месяца**: 8 live-занятий по 2 ч + 3 в записи (11 занятий всего).


      **Суть:** довести до **production-ready агентных систем** — от LLM API и Cursor до RAG, LangGraph,
      MCP, security, evals и задела под мультиагентов. Один сквозной проект от чат-бота до автономного
      агента.


      **Кому:** разработчики, tech lead’ы, архитекторы с базой в ИТ. Интенсив — быстрый старт в Cursor;
      этот курс — полный стек агентной разработки.


      Цена отдельно: 39 990 ₽ · llmstart.ru/agents/'
  metadata:
    segment: b2c
    intent: format
    source: synthetic
    gt_quality: verified
    product_id: ai-coding-agents-base
    facts:
    - 11 занятий, ~1,5 мес
    - production-ready агенты
    - RAG LangChain LangGraph MCP security evals
    - 'ЦА: разработчики и архитекторы'
    - отличие от интенсива — глубина и длительность
    source_chat: null
