# Eval-fix loop iter 2: KB v001 + search-fallback prompt (E-7/E-22)
config_id: candidate-kb-alignment-search-fallback-v001
comment: "Loop 2: KB facts (iter1) + SYSTEM_PROMPT_SEARCH_FALLBACK — one param vs kb-alignment"
benchmark_only: true

agent:
  impl: langchain-react
  api_url: http://localhost:8000/api/v1/chat

retrieval:
  backend: in-memory

model:
  provider: openrouter
  name: ${LLM_MODEL}
  temperature: ${LLM_TEMPERATURE}

judge:
  provider: openrouter
  name: ${EVAL_JUDGE_MODEL}
  temperature: ${EVAL_JUDGE_TEMPERATURE}

prompt:
  source: file
  path: backend/app/agent/prompts.py
  name: SYSTEM_PROMPT_SEARCH_FALLBACK

datasets:
  e2e-qa: v001
