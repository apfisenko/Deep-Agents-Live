# Smoke config: one parameter differs from baseline (E-7/E-8)
config_id: benchmark-high-temp
comment: "Benchmark-only: higher temperature for config_id smoke tests"
benchmark_only: true

agent:
  impl: langchain-react
  api_url: http://localhost:8000/api/v1/chat

retrieval:
  backend: in-memory

model:
  provider: openrouter
  name: ${LLM_MODEL}
  temperature: 0.8

judge:
  provider: openrouter
  name: ${EVAL_JUDGE_MODEL}
  temperature: ${EVAL_JUDGE_TEMPERATURE}

prompt:
  source: file
  path: backend/app/agent/prompts.py
  name: SYSTEM_PROMPT

datasets:
  e2e-qa: v001
