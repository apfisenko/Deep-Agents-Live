# Sprint-06 task 06: GraphRAG hybrid retrieval (Qdrant + Neo4j RRF + reranker).
config_id: graphrag-v001
comment: "Sprint-06 task 06: hybrid retriever — vector+graph+global RRF, bge-reranker-v2-m3"

benchmark_only: false

agent:
  impl: langchain-react
  api_url: ${BACKEND_URL}/api/v1/chat

retrieval:
  backend: qdrant

retriever:
  backend: hybrid
  top_k: 5
  rrf_k: 60
  combo_slug: ai-agents-combo
  anchor_k: 8
  hybrid_weights:
    vector: 1.0
    graph: 1.2
    global: 1.2
  reranker_enabled: true
  reranker_model: BAAI/bge-reranker-v2-m3
  reranker_candidate_k: 15
  reranker_timeout_sec: 8.0

vector_db:
  engine: qdrant
  server_image: qdrant/qdrant:v1.18.1
  client: qdrant-client==1.18.0
  collection: knowledge_base
  embedding_model: openai/text-embedding-3-small
  chunk_size: 600
  chunk_overlap: 80
  top_k: 5
  langfuse_dataset: deep_agents_live_v001

model:
  provider: openrouter
  name: ${LLM_MODEL}
  temperature: ${LLM_TEMPERATURE}

judge:
  provider: openrouter
  name: ${EVAL_JUDGE_MODEL}
  temperature: ${EVAL_JUDGE_TEMPERATURE}

prompt:
  source: file
  path: ${SYSTEM_PROMPT_PATH}
  name: SYSTEM_PROMPT_SEARCH_FALLBACK

datasets:
  multi-hop: v001
  global: v001
  single-hop: v001

extra_evaluators: []
