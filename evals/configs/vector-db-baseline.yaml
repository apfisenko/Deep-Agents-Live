# Sprint-05 vector DB baseline (Qdrant). Same agent/model/judge/prompt as baseline-react-inmemory.
config_id: vector-db-baseline
comment: "Sprint-05: ReAct + Qdrant vector DB; same model/judge/prompt as baseline-react-inmemory"

benchmark_only: false

agent:
  impl: langchain-react
  api_url: ${BACKEND_URL}/api/v1/chat

retrieval:
  type: vector_db
  backend: qdrant

# Documented index params (must match `make index` / backend env at run time)
vector_db:
  engine: qdrant
  server_image: qdrant/qdrant:v1.18.1
  client: qdrant-client==1.18.0
  collection: knowledge_base
  embedding_model: openai/text-embedding-3-small
  chunk_size: 600
  chunk_overlap: 80
  top_k: 5
  langfuse_dataset: deep_agents_live_v001

model:
  provider: openrouter
  name: ${LLM_MODEL}
  temperature: ${LLM_TEMPERATURE}

judge:
  provider: openrouter
  name: ${EVAL_JUDGE_MODEL}
  temperature: ${EVAL_JUDGE_TEMPERATURE}

prompt:
  source: file
  path: ${SYSTEM_PROMPT_PATH}
  name: SYSTEM_PROMPT_SEARCH_FALLBACK

datasets:
  e2e-qa: v001
  rag-format-facts: v001
  rag-product-facts: v001
  segment-routing: v001
  funnel-to-lead: v001
  out-of-catalog: v001
  objections-trust: v001
  error-analysis-hits: v001

extra_evaluators:
  - executed_tools_count
